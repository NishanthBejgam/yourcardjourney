<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YourCardJourney Store</title>
  <meta name="description" content="Join the YourCardJourney community." />
  <link rel="icon" type="image/svg+xml" href="favicon.svg" />
  <link rel="preconnect" href="https://rsms.me/" />
  <link rel="stylesheet" href="https://rsms.me/inter/inter.css" />
  <link rel="stylesheet" href="styles.css" />
  <script>document.documentElement.classList.add('js');</script>
</head>
<body class="page-connect">
  <svg width="0" height="0" style="position:absolute" aria-hidden="true">
    <defs>
      <g id="i-logo" fill="none" stroke="currentColor" stroke-width="1.6">
        <circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="3.4" fill="currentColor" stroke="none"/>
      </g>
      <path id="i-whatsapp" fill="currentColor" d="M12 2.2A9.8 9.8 0 0 0 3.6 17l-1.4 5 5.15-1.35A9.8 9.8 0 1 0 12 2.2zm0 1.9a7.9 7.9 0 0 1 6.7 12.1 7.9 7.9 0 0 1-10 3l-.36-.2-3 .8.8-2.94-.23-.38A7.9 7.9 0 0 1 12 4.1zm-3.1 3.6c-.17 0-.44.06-.67.31-.23.25-.88.86-.88 2.1 0 1.24.9 2.44 1.02 2.6.13.17 1.75 2.8 4.32 3.8 2.14.85 2.57.68 3.03.64.46-.04 1.5-.61 1.71-1.2.21-.59.21-1.1.15-1.2-.06-.1-.23-.17-.48-.29-.25-.13-1.5-.74-1.73-.82-.23-.09-.4-.13-.57.12-.17.25-.65.82-.8.99-.15.17-.29.19-.54.06-.25-.13-1.06-.39-2.02-1.25-.75-.66-1.25-1.48-1.4-1.73-.15-.25-.02-.38.11-.51.11-.11.25-.29.38-.44.12-.15.16-.25.25-.42.08-.17.04-.31-.02-.44-.06-.12-.55-1.37-.77-1.87-.2-.48-.41-.42-.57-.42z"/>
      <path id="i-x" fill="currentColor" d="M17.3 3H20l-6.1 7 7.2 11h-5.6l-4.4-6.4L5.6 21H3l6.6-7.5L2.6 3h5.7l4 5.9L17.3 3zm-1 16h1.5L7.8 4.4H6.2L16.3 19z"/>
      <g id="i-arrow" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
        <line x1="4" y1="12" x2="20" y2="12"/><polyline points="13,5 20,12 13,19"/>
      </g>
    </defs>
  </svg>

  <nav class="nav" id="nav">
    <div class="nav-inner">
      <a href="index.html" class="brand" aria-label="YourCardJourney — go to home">
        <span class="brand-mark" aria-hidden="true">
          <svg class="ico ico-mark" viewBox="0 0 48 48">
            <!-- solid ink tile — same language as the page's feature glyphs -->
            <rect x="1" y="1" width="46" height="46" rx="13" fill="var(--ink)"/>
            <g fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <!-- the card -->
              <rect x="9" y="20" width="22" height="15" rx="3.2"/>
              <path d="M9 25.5h22"/>
              <!-- the journey: one clean line rising up out of the card -->
              <path class="mk-rise" d="M15 31.5L36 12" pathLength="100"/>
              <path d="M36 12L29.5 12M36 12L36 18.5"/>
            </g>
          </svg>
        </span>
        <span class="brand-text">
          <span class="brand-word">YourCard<em>Journey</em></span>
          <span class="brand-tag">One place · Every card tool</span>
        </span>
      </a>
      <div class="nav-links">
        <a href="index.html#license">Get License</a>
        <a href="social.html" class="active">Connect</a>
      </div>
    </div>
  </nav>

  <main>
    <section class="hero">
      <h1>
        <span class="line"><span>Let's connect.</span></span>
      </h1>
      <p class="hero-sub">Two doors into the same ecosystem. Come build your card journey with us.</p>
    </section>

    <section class="social">
      <div class="social-grid">
        <a class="social-card reveal" href="https://whatsapp.com/channel/0029Vb6gU8QIt5rqf5Yxao0n" target="_blank" rel="noopener" style="--grad:linear-gradient(140deg,#25d366 0%,#12b455 100%);--glow:rgba(37,211,102,.4)">
          <div class="tile"><svg viewBox="0 0 24 24"><use href="#i-whatsapp"/></svg></div>
          <h3>WhatsApp Channel</h3>
          <p>Follow the channel for every update.</p>
          <span class="arw-c"><svg viewBox="0 0 24 24"><use href="#i-arrow"/></svg></span>
        </a>
        <a class="social-card reveal" href="https://x.com/YourCardJourney" target="_blank" rel="noopener" style="--grad:linear-gradient(140deg,#2a2a2e 0%,#0a0a0b 100%);--glow:rgba(10,10,11,.32)">
          <div class="tile"><svg viewBox="0 0 24 24"><use href="#i-x"/></svg></div>
          <h3>X</h3>
          <p>@YourCardJourney</p>
          <span class="arw-c"><svg viewBox="0 0 24 24"><use href="#i-arrow"/></svg></span>
        </a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <!-- Acceleration line — the same "slow by hand, instant with the tools"
         idea, retold in the page's own minimal, line-art language. -->
    <div class="boostline">
      <div class="boost-track" aria-hidden="true">
        <span class="pace"></span>
        <!-- checkpoint 1 — the first card milestone: speeds up 0.5x → 1.8x -->
        <span class="node node-a">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2.5" y="5.5" width="19" height="13" rx="2.5"/>
            <path d="M2.5 9.5h19"/><path d="M6 14.5h4"/>
          </svg>
        </span>
        <!-- checkpoint 2 — the next card milestone: rockets 1.8x → 3.4x -->
        <span class="node node-b">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2.5" y="5.5" width="19" height="13" rx="2.5"/>
            <path d="M2.5 9.5h19"/><path d="M6 14.5h4"/>
          </svg>
        </span>
        <!-- the traveller: an analog clock, stepping up in speed & colour at each checkpoint -->
        <span class="comet">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round">
            <circle cx="12" cy="12" r="8.2"/>
            <line class="ch-h" x1="12" y1="12" x2="12" y2="7.6"/>
            <line class="ch-m" x1="12" y1="12" x2="15.4" y2="12"/>
          </svg>
        </span>
      </div>
      <p class="boost-caption">
        By hand, it&rsquo;s a long walk. <em class="grad-word">Add the tools and you&rsquo;re gone.</em>
      </p>
    </div>
  </footer>

  <script src="app.js"></script>
</body>
</html>
